<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/ex_02.css" />
  </head>
  <body>
    <!-- 전체 로그인 박스 -->
    <div class="login-box">
      <!-- 구글 로그인 버튼 -->
      <div class="google-btn">
        <!-- 로고 -->
        <p class="google-logo">
          <img src="image/google_logo.png" alt="구글로고" />
        </p>
        <!-- 로그인 메세지 -->
        <p class="login-txt">Log in with Google</p>
      </div>

      <!-- or -->
      <p class="or-txt">or</p>

      <!-- 입력폼 -->
      <div class="form">
        <!-- 이름 입력창 -->
        <input type="text" placeholder="Username" />
        <!-- 비밀번호 입력창 -->
        <input type="password" placeholder="Password" />
        <!-- 로그인 버튼 -->
        <button class="login-btn">LOGIN</button>
      </div>

      <!-- 비밀번호 찾기 버튼 -->
      <button class="forgot">Forgot your password?</button>
    </div>
  </body>
</html>
